[book]
title = "Luna — SNES Emulator Guide"
authors = ["k0b3n4irb"]
language = "en"
src = "src"
description = "Guide and reference for Luna, a cycle-accurate, AI-native SNES emulator written in Rust."

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/k0b3n4irb/luna"
edit-url-template = "https://github.com/k0b3n4irb/luna/edit/develop/book/{path}"
additional-css = ["theme/luna.css"]

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 20

[output.html.playground]
runnable = false
