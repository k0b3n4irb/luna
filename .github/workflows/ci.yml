name: CI

on:
  # CI runs continuously on `develop` (the integration branch) and on every
  # pull request. `main` is NOT a push trigger: it only ever receives merges
  # from a green PR, gated by branch protection (required status checks), so a
  # post-merge re-run on main would be redundant.
  push:
    branches: [develop]
  pull_request:

# Cancel older runs of the same ref when a new one starts.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # missing_docs is a warning in the workspace lints; -D warnings turns it
  # (and any other warning) into a hard error in CI.
  RUSTFLAGS: "-D warnings"
  # Reduce noise from incremental compilation when caches are warm.
  CARGO_INCREMENTAL: "0"
  # actions/cache@v4 still ships a Node.js 20 entrypoint (deprecated; forced
  # to Node 24 by the runner from 2026-06-16). Opt into Node 24 now to clear
  # the deprecation warning. See github.blog/changelog/2025-09-19.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ---------------------------------------------------------------------
  # cargo check on the host (Linux x86_64). Catches any warning as error.
  # ---------------------------------------------------------------------
  check:
    name: check (native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install ALSA headers (cpal → alsa-sys)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets

  # ---------------------------------------------------------------------
  # cargo test on the host.
  # ---------------------------------------------------------------------
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install ALSA headers (cpal → alsa-sys)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  # ---------------------------------------------------------------------
  # cargo check on wasm32-unknown-unknown for every cross-target crate.
  #
  # The exclusion list = the "native-only" crates from ARCHITECTURE.md §4:
  #   luna-mcp-server, luna-rest, luna-ws, luna-ffi, luna-libretro,
  #   luna-cli (binary), luna-gui (eframe — supports WASM but pulls
  #   native-only deps in dev), luna-overlay.
  # Everything else MUST build for wasm32 or the design is broken.
  # ---------------------------------------------------------------------
  wasm-check:
    name: check (wasm32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm
      - run: |
          cargo check --target wasm32-unknown-unknown \
            -p luna-bus \
            -p luna-cpu-65c816 \
            -p luna-cpu-spc700 \
            -p luna-ppu \
            -p luna-apu \
            -p luna-cartridge \
            -p luna-core \
            -p luna-api

  # ---------------------------------------------------------------------
  # Formatting (cargo fmt --check).
  # ---------------------------------------------------------------------
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all --check

  # ---------------------------------------------------------------------
  # Lints (cargo clippy with -D warnings on top of workspace lints).
  # ---------------------------------------------------------------------
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install ALSA headers (cpal → alsa-sys)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # ---------------------------------------------------------------------
  # NOTE: the Tom Harte SingleStepTests (both CPU cores) used to run here on
  # every push. They are the exhaustive instruction-semantics gate but the
  # 65C816 run alone is ~25 min on GitHub runners — overkill per push. They
  # now live in a dedicated, manually-dispatched workflow:
  # `.github/workflows/tom-harte.yml` (Actions → "Tom Harte CPU suites" →
  # Run workflow). Run it before merging CPU-core changes.
  # ---------------------------------------------------------------------

  # ---------------------------------------------------------------------
  # SNES test-ROM golden suite (Peter Lemon hardware tests). Following the
  # twvd/siena convention the ROM corpus lives in a sibling checkout
  # (../luna_tests), sparse-cloned on demand. The harness boots each ROM
  # and compares a SHA-256 of the framebuffer to a committed golden hash.
  # ---------------------------------------------------------------------
  snes-test-roms:
    name: snes-test-roms
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: snes-test-roms
      - name: Cache SNES test-ROM corpus
        id: rom-cache
        uses: actions/cache@v4
        with:
          path: ../luna_tests
          key: snes-test-roms-${{ hashFiles('tools/fetch-snes-test-roms.sh') }}
      - name: Fetch corpus (on cache miss)
        if: steps.rom-cache.outputs.cache-hit != 'true'
        run: tools/fetch-snes-test-roms.sh
      - name: Run golden suite
        run: cargo test -p luna-core --test snes_test_roms --release
