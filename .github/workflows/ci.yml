name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel older runs of the same ref when a new one starts.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # missing_docs is a warning in the workspace lints; -D warnings turns it
  # (and any other warning) into a hard error in CI.
  RUSTFLAGS: "-D warnings"
  # Reduce noise from incremental compilation when caches are warm.
  CARGO_INCREMENTAL: "0"

jobs:
  # ---------------------------------------------------------------------
  # cargo check on the host (Linux x86_64). Catches any warning as error.
  # ---------------------------------------------------------------------
  check:
    name: check (native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install ALSA headers (cpal → alsa-sys)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets

  # ---------------------------------------------------------------------
  # cargo test on the host.
  # ---------------------------------------------------------------------
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install ALSA headers (cpal → alsa-sys)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  # ---------------------------------------------------------------------
  # cargo check on wasm32-unknown-unknown for every cross-target crate.
  #
  # The exclusion list = the "native-only" crates from ARCHITECTURE.md §4:
  #   luna-mcp-server, luna-rest, luna-ws, luna-ffi, luna-libretro,
  #   luna-cli (binary), luna-gui (eframe — supports WASM but pulls
  #   native-only deps in dev), luna-overlay.
  # Everything else MUST build for wasm32 or the design is broken.
  # ---------------------------------------------------------------------
  wasm-check:
    name: check (wasm32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm
      - run: |
          cargo check --target wasm32-unknown-unknown \
            -p luna-bus \
            -p luna-cpu-65c816 \
            -p luna-cpu-spc700 \
            -p luna-ppu \
            -p luna-apu \
            -p luna-cartridge \
            -p luna-core \
            -p luna-api

  # ---------------------------------------------------------------------
  # Formatting (cargo fmt --check).
  # ---------------------------------------------------------------------
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all --check

  # ---------------------------------------------------------------------
  # Lints (cargo clippy with -D warnings on top of workspace lints).
  # ---------------------------------------------------------------------
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install ALSA headers (cpal → alsa-sys)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # ---------------------------------------------------------------------
  # Tom Harte SingleStepTests for both CPU cores (the exhaustive
  # instruction-semantics gate). These tests are #[ignore] by default —
  # they need a large external dataset and the 65C816 run is ~8 min — so
  # they don't run in the `test` job above. LUNA_TOM_HARTE_REQUIRE=1 turns
  # any mismatch into a hard failure (otherwise the test just reports).
  #
  # Datasets:
  #   - 65C816 (`tests/tom-harte/v1`) is committed, so it's present after
  #     checkout — no fetch needed.
  #   - SPC700 (`tests/tom-harte-spc700/v1`) is an external shallow clone;
  #     fetch it on a cache miss and cache it across runs.
  # ---------------------------------------------------------------------
  tom-harte:
    name: tom-harte (cpu suites)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: tom-harte
      - name: Cache SPC700 Tom Harte dataset
        id: spc-cache
        uses: actions/cache@v4
        with:
          path: tests/tom-harte-spc700/v1
          key: tom-harte-spc700-${{ hashFiles('tools/fetch-tom-harte-spc700.sh') }}
      - name: Fetch SPC700 dataset (on cache miss)
        if: steps.spc-cache.outputs.cache-hit != 'true'
        run: tools/fetch-tom-harte-spc700.sh
      - name: SPC700 suite (strict)
        env:
          LUNA_TOM_HARTE_REQUIRE: "1"
        run: cargo test -p luna-cpu-spc700 --test tom_harte --release -- --ignored --nocapture
      - name: 65C816 suite (strict)
        env:
          LUNA_TOM_HARTE_REQUIRE: "1"
        run: cargo test -p luna-cpu-65c816 --test tom_harte --release -- --ignored --nocapture
